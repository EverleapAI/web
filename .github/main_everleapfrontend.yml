name: Build and deploy Node.js app to Azure Web App - EverleapFrontEnd

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      # Find where Next.js actually created the standalone runtime
      - name: Detect standalone output
        run: |
          echo "Searching for server.js inside .next..."
          find .next -name "server.js"

          if [ -f ".next/standalone/apps/web/server.js" ]; then
            echo "STANDALONE_DIR=.next/standalone/apps/web" >> $GITHUB_ENV
          elif [ -f ".next/standalone/server.js" ]; then
            echo "STANDALONE_DIR=.next/standalone" >> $GITHUB_ENV
          else
            echo "ERROR: Could not find standalone server.js"
            find .next -maxdepth 5
            exit 1
          fi

      - name: Copy static assets
        run: |
          mkdir -p "$STANDALONE_DIR/.next"
          cp -R .next/static "$STANDALONE_DIR/.next/static"
          if [ -d public ]; then
            cp -R public "$STANDALONE_DIR/public"
          fi

      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp -R "$STANDALONE_DIR"/* deploy/
          cp -R "$STANDALONE_DIR"/.[!.]* deploy/ || true

      # THIS STEP TELLS US IF SERVER.JS IS PRESENT
      - name: Validate deploy folder
        run: |
          echo "Contents of deploy folder:"
          find deploy -maxdepth 3

          if [ ! -f deploy/server.js ]; then
            echo "ERROR: server.js missing"
            exit 1
          fi

          if [ ! -f deploy/package.json ]; then
            echo "ERROR: package.json missing"
            exit 1
          fi

          echo "Validation passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Validate downloaded artifact
        run: |
          echo "Downloaded artifact contents:"
          find . -maxdepth 3

          if [ ! -f server.js ]; then
            echo "ERROR: server.js missing in artifact"
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: EverleapFrontEnd
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_24E228BFD7E742B4ADD607143CA35169 }}