name: Deploy Web App to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_STANDALONE: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Next.js application
        working-directory: apps/web
        run: npm run build

      - name: Prepare standalone deployment package
        run: |
          mkdir -p deploy
          cp -r apps/web/.next/standalone/apps/web/* deploy/
          mkdir -p deploy/.next
          cp -r apps/web/.next/static deploy/.next/static
          if [ -d apps/web/public ]; then cp -r apps/web/public deploy/public; fi
          cat > deploy/package.json <<'EOF'
          {
            "name": "web-standalone",
            "private": true,
            "scripts": {
              "start": "node server.js"
            }
          }
          EOF

      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../release.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'front-end'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
