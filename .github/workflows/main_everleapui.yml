name: Deploy EverleapDevUI to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Prepare flat deploy folder
        shell: bash
        run: |
          set -euo pipefail

          if [ -f ".next/standalone/server.js" ]; then
            SERVER_DIR=".next/standalone"
          elif [ -f ".next/standalone/web/web/server.js" ]; then
            SERVER_DIR=".next/standalone/web/web"
          elif [ -f ".next/standalone/apps/web/server.js" ]; then
            SERVER_DIR=".next/standalone/apps/web"
          else
            echo "Could not find standalone server.js"
            find .next/standalone -type f -name server.js
            exit 1
          fi

          echo "Using standalone root: $SERVER_DIR"

          rm -rf deploy
          mkdir -p deploy

          cp -R "$SERVER_DIR"/. deploy/

          rm -rf deploy/.next/static
          mkdir -p deploy/.next
          cp -R .next/static deploy/.next/static

          rm -rf deploy/public
          cp -R public deploy/public

          test -f deploy/server.js
          test -d deploy/.next/static
          test -d deploy/public

          echo "Deploy folder ready"
          ls -la deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: EverleapDevUI
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
