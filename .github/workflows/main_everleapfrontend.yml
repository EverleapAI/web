name: Build and deploy Node.js app to Azure Web App - EverleapFrontEnd

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Copy static assets into standalone app
        run: |
          mkdir -p .next/standalone/apps/web/.next
          cp -R .next/static .next/standalone/apps/web/.next/static
          if [ -d public ]; then cp -R public .next/standalone/apps/web/public; fi

      - name: Prepare flat deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R .next/standalone/apps/web/* deploy/
          cp -R .next/standalone/apps/web/.[!.]* deploy/ || true

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Inspect downloaded artifact
        run: |
          echo "PWD=$(pwd)"
          echo "Top level files:"
          ls -la
          echo ""
          echo "Finding server.js:"
          find . -name server.js
          echo ""
          echo "Finding package.json:"
          find . -name package.json
          echo ""
          echo "Top 3 directory levels:"
          find . -maxdepth 3 | sort

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: EverleapFrontEnd
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_24E228BFD7E742B4ADD607143CA35169 }}